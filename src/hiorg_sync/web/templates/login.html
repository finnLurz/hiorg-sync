{% extends "base.html" %}
{% block content %}
  <h1 class="fwTitle">HiOrg-Sync Login</h1>

  <form method="post" action="/ui/login">
    <input type="hidden" name="next" value="{{ next or '/ui/ov' }}">

    <div style="margin: 12px 0 8px;">
      <label class="fwHint">Passwort</label>
    </div>

    <input class="fwInput" type="password" name="password" autofocus placeholder="••••••••">

    <div style="margin-top: 14px;">
      <button class="fwBtn" type="submit">Anmelden</button>
    </div>

    <div class="fwHint" style="margin-top: 10px;">
      Session läuft nach {{ ttl_hours or 12 }}h ab.
    </div>
  </form>
{% endblock %}
