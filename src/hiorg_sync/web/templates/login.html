{% extends "base.html" %}
{% block content %}
<div class="loginWrap">
  <div class="loginBrand">
    <span class="loginLogo">⚡</span>
    <h1 class="loginTitle">HiOrg-Sync</h1>
    <p class="loginSubtitle">Administration</p>
  </div>

  <form method="post" action="/ui/login" class="loginForm">
    <input type="hidden" name="next" value="{{ next or '/ui/ov' }}">

    <div class="loginField">
      <label class="loginLabel" for="password">Passwort</label>
      <input
        class="fwInput"
        id="password"
        type="password"
        name="password"
        autofocus
        placeholder="••••••••"
      >
    </div>

    {% if error %}
    <div class="fwAlert fwAlert--error">
      {{ error }}
    </div>
    {% endif %}

    <button class="fwBtn loginBtn" type="submit">Anmelden</button>

    <p class="loginHint">Session läuft nach {{ ttl_hours or 12 }}h ab.</p>
  </form>
</div>

<style>
.fwCard {
  max-width: 420px !important;
}
.loginWrap {
  display: flex;
  flex-direction: column;
  gap: 28px;
}
.loginBrand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding-top: 8px;
}
.loginLogo {
  font-size: 40px;
  line-height: 1;
}
.loginTitle {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.4px;
  margin: 0;
}
.loginSubtitle {
  font-size: 13px;
  color: var(--hs-text-muted);
  margin: 0;
}
.loginForm {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.loginField {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.loginLabel {
  font-size: 13px;
  font-weight: 500;
  color: var(--hs-text-muted);
}
.loginBtn {
  width: 100%;
  height: 44px;
  font-size: 15px;
}
.loginHint {
  font-size: 12px;
  color: var(--hs-text-subtle);
  text-align: center;
  margin: 0;
}
</style>
{% endblock %}
