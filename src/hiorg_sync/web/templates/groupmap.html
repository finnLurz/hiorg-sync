{% extends "base.html" %}
{% block content %}

<div class="topbar">
  <h1>Gruppen-Mapping ({{ ov }})</h1>
  <a class="fwBtn2 btn-back" href="/ui/ov">← Zurück</a>
</div>

<div class="fwHint" style="margin-bottom: 14px;">
  Ziel: HiOrg-Gruppen (nach Standort) einer <b>GroupBaseDN</b> zuordnen.
  Gruppen werden <b>nicht</b> automatisch angelegt.
</div>

<div class="actions">
  <button class="fwBtn" type="button" onclick="loadAll()">Laden</button>
  <button class="fwBtn2" type="button" onclick="saveAll()">Speichern</button>
</div>

<h3 style="margin: 18px 0 10px;">Standort → BaseDN</h3>
<div id="locs"></div>
<div style="margin-top: 10px;">
  <button class="fwBtn2" type="button" onclick="addLoc()">+ Standort</button>
</div>

<h3 style="margin: 26px 0 10px;">Gruppen</h3>
<div class="fwRow fwHdr">
  <div>HiOrg Gruppe</div>
  <div>Standort</div>
  <div>BaseDN</div>
  <div>AD Gruppen-CN (optional)</div>
</div>
<div id="groups"></div>

<script>
  window.HIORG_OV = "{{ ov }}";
</script>
<script src="/static/groupmap.js"></script>

{% endblock %}
