<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "HiOrg-Sync" }}</title>

  <link rel="stylesheet" href="/static/styles.css">
  <!-- optional: fuer schnelle Anpassungen ohne styles.css anzufassen -->
  <link rel="stylesheet" href="/static/custom.css">
</head>
<body>
  <div class="fwWrap">
    <div class="fwCard">

      {% if request.cookies.get("ui_session") %}
        <div class="fwCardTop">
          <a class="fwBtn2 fwLogout" href="/ui/logout">Logout</a>
        </div>
      {% endif %}

      {% block content %}{% endblock %}
    </div>
  </div>
</body>

</html>
